[project]
site_name = "zarr-swiftstore"
site_description = "OpenStack Swift object storage backend for zarr v3"
site_author = "Pavan Siligam"
site_url = "https://siligam.github.io/zarr-swiftstore/"
copyright = "Copyright &copy; 2024 Pavan Siligam"
docs_dir = "docs"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Authentication" = "authentication.md" },
  { "Usage" = [
    { "zarr" = "usage/zarr.md" },
    { "xarray" = "usage/xarray.md" },
    { "Container Utilities" = "usage/utilities.md" },
  ]},
  { "Testing" = "testing.md" },
  { "API Reference" = "api.md" },
  { "Architecture" = [
    { "ADR 001 — Native Swift vs S3 Compat" = "adr/001-native-swift-over-s3-compat.md" },
  ]},
]

[project.theme]
variant = "default"
language = "en"

features = [
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
