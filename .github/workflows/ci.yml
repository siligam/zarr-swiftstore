name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for setuptools-scm to read git tags

      - name: Start Swift (SAIO)
        run: |
          docker pull openstackswift/saio
          docker run -d -p 8080:8080 openstackswift/saio
          sleep 5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        env:
          ZARR_TEST_SWIFT: "1"
          ST_AUTH: "http://localhost:8080/auth/v1.0"
          ST_USER: "test:tester"
          ST_KEY: "testing"
        run: uv run pytest -v zarrswift
